$kind: http-request
name: Create Bookmark - Title Too Long
method: POST
url: '{{baseUrl}}/bookmarks'
order: 10000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{authToken}}'
body:
  type: json
  content: |-
    {
      "url": "https://postman.com",
      "title": "A title that is way too long and exceeds the 255 character limit. Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris."
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 400", function () {
        pm.response.to.have.status(400);
      });
      
      pm.test("Response has error field", function () {
        var jsonData = pm.response.json();
        pm.expect(jsonData).to.have.property("error");
      });
